<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Banking - Login</title>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 350px;
        }

        h2 {
            color: #007bff;
            margin-bottom: 20px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 14px;
            margin: 10px 0 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        .btn-login {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            border-radius: 5px;
        }

        .btn-login:hover {
            background-color: #0056b3;
        }

        .error {
            color: red;
            font-size: 12px;
            display: none;
            margin-top: 10px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Internet Banking</h2>
        <form id="loginForm">
            <label for="username">User ID:</label>
            <input type="text" id="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" required>

            <button type="submit" class="btn-login">Login</button>
            <p id="error-message" class="error">User ID atau Password salah!</p>
        </form>
        <div class="footer">&copy; 2025 Internet Banking Secure</div>
    </div>

    <script>
        const users = [
            { username: "bankuser", password: "secure123", role: "user" },
            { username: "admin", password: "adminpass", role: "admin" }
        ];

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            var errorMessage = document.getElementById('error-message');
            
            var user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('username', username);
                localStorage.setItem('role', user.role);
                window.location.href = user.role === "admin" ? 'admin_dashboard.html' : 'user_dashboard.html';
            } else {
                errorMessage.style.display = 'block';
            }
        });
    </script>

</body>
</html>
